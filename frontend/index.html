<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VedicBot — Ancient Wisdom, Modern Interface</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #e8e0d0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #111111;
      border-bottom: 1px solid #2a2010;
      padding: 14px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #f5a623;
      letter-spacing: 0.05em;
    }

    .logo span {
      color: #ff6b00;
    }

    .logo-sub {
      font-size: 0.65rem;
      color: #7a6a50;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #connectBtn {
      padding: 8px 18px;
      border: 1px solid #f5a623;
      border-radius: 8px;
      background: transparent;
      color: #f5a623;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    #connectBtn:hover { background: #f5a62322; }
    #connectBtn.connected { border-color: #10b981; color: #10b981; }

    .wallet-badge {
      display: none;
      font-size: 0.75rem;
      color: #7a6a50;
      font-family: monospace;
    }
    .wallet-badge.visible { display: block; }

    /* ── Layout ── */
    .app-container {
      flex: 1;
      display: flex;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Language selector ── */
    .lang-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .lang-label {
      font-size: 0.75rem;
      color: #7a6a50;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .lang-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #2a2010;
      background: #111111;
      color: #a09070;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn:hover { border-color: #f5a623; color: #f5a623; }
    .lang-btn.active {
      background: #f5a62322;
      border-color: #f5a623;
      color: #f5a623;
      font-weight: 600;
    }

    /* ── Chat window ── */
    .chat-window {
      flex: 1;
      background: #111111;
      border: 1px solid #2a2010;
      border-radius: 16px;
      padding: 20px;
      min-height: 420px;
      max-height: 500px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-window::-webkit-scrollbar { width: 4px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }
    .chat-window::-webkit-scrollbar-thumb { background: #2a2010; border-radius: 4px; }

    /* ── Welcome message ── */
    .welcome {
      text-align: center;
      padding: 30px 20px;
      opacity: 0.7;
    }
    .welcome .om {
      font-size: 3rem;
      color: #f5a623;
      margin-bottom: 12px;
    }
    .welcome h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      color: #c8a870;
      margin-bottom: 8px;
    }
    .welcome p {
      font-size: 0.85rem;
      color: #7a6a50;
      line-height: 1.6;
    }

    /* ── Messages ── */
    .message {
      display: flex;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .avatar.bot { background: #2a1a00; border: 1px solid #f5a62344; }
    .avatar.user-av { background: #1a1a2a; border: 1px solid #6060a044; }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.65;
    }

    .message.bot .bubble {
      background: #1a1500;
      border: 1px solid #2a2010;
      border-top-left-radius: 4px;
      color: #e8e0d0;
    }

    .message.user .bubble {
      background: #1e1400;
      border: 1px solid #f5a62333;
      border-top-right-radius: 4px;
      color: #f5d990;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 4px 0;
    }
    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #f5a623;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input area ── */
    .input-area {
      display: flex;
      gap: 10px;
      background: #111111;
      border: 1px solid #2a2010;
      border-radius: 14px;
      padding: 10px 14px;
      align-items: flex-end;
    }

    #messageInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e8e0d0;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      resize: none;
      max-height: 100px;
      line-height: 1.5;
    }

    #messageInput::placeholder { color: #4a4030; }

    #sendBtn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: none;
      background: #f5a623;
      color: #0d0d0d;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #sendBtn:hover { background: #ff6b00; }
    #sendBtn:disabled { background: #2a2010; color: #4a4030; cursor: not-allowed; }

    /* ── Suggestions ── */
    .suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .suggestion-chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #2a2010;
      background: #111111;
      color: #a09070;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion-chip:hover {
      border-color: #f5a623;
      color: #f5a623;
      background: #f5a62311;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 12px;
      font-size: 0.72rem;
      color: #3a3020;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">ॐ Vedic<span>Bot</span></div>
    <div class="logo-sub">Ancient Wisdom · Modern Interface</div>
  </div>
  <div class="header-right">
    <div class="wallet-badge" id="walletBadge"></div>
    <button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
  </div>
</header>

<div class="app-container">

  <!-- Language Bar -->
  <div class="lang-bar">
    <span class="lang-label">Language:</span>
    <button class="lang-btn active" onclick="setLang('english', this)">English</button>
    <button class="lang-btn" onclick="setLang('hindi', this)">हिन्दी</button>
    <button class="lang-btn" onclick="setLang('tamil', this)">தமிழ்</button>
    <button class="lang-btn" onclick="setLang('telugu', this)">తెలుగు</button>
    <button class="lang-btn" onclick="setLang('sanskrit', this)">संस्कृत</button>
  </div>

  <!-- Chat Window -->
  <div class="chat-window" id="chatWindow">
    <div class="welcome" id="welcomeMsg">
      <div class="om">ॐ</div>
      <h2>Namaste, Seeker of Knowledge</h2>
      <p>Ask me anything about the Vedas, Upanishads,<br/>Bhagavad Gita, Sanskrit, or Vedic philosophy.</p>
    </div>
  </div>

  <!-- Suggestion Chips -->
  <div class="suggestions" id="suggestions">
    <button class="suggestion-chip" onclick="sendSuggestion(this)">What are the four Vedas?</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">Explain the concept of Dharma</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">A shloka on inner peace</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">What is Moksha?</button>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <textarea id="messageInput" rows="1" placeholder="Ask about Vedic wisdom…"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

</div>

<footer>Built with ❤️ on Shardeum &mdash; Powered by Vedic Knowledge</footer>

<script>
  const API_URL = "http://localhost:8000";
  let currentLang = "english";
  let sessionId = "session_" + Math.random().toString(36).substr(2, 9);
  let isLoading = false;

  // ── Language ──
  function setLang(lang, btn) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // ── Auto resize textarea ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  // ── Enter to send ──
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── Suggestion chips ──
  function sendSuggestion(btn) {
    document.getElementById('messageInput').value = btn.textContent;
    sendMessage();
  }

  // ── Send message ──
  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    if (!message) return;

    // Hide welcome & suggestions
    document.getElementById('welcomeMsg').style.display = 'none';
    document.getElementById('suggestions').style.display = 'none';

    input.value = '';
    input.style.height = 'auto';

    appendMessage('user', message);
    showTyping();
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: message,
          session_id: sessionId,
          language: currentLang
        })
      });

      const data = await res.json();
      removeTyping();
      appendMessage('bot', data.response);
    } catch (err) {
      removeTyping();
      appendMessage('bot', '⚠️ Could not connect to VedicBot. Please ensure the backend is running.');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }

  // ── Append message bubble ──
  function appendMessage(role, text) {
    const chatWindow = document.getElementById('chatWindow');
    const div = document.createElement('div');
    div.className = `message ${role === 'user' ? 'user' : 'bot'}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'user' ? 'user-av' : 'bot'}`;
    avatar.textContent = role === 'user' ? '🙏' : 'ॐ';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text
  .replace(/&/g, '&amp;')
  .replace(/</g, '&lt;')
  .replace(/>/g, '&gt;')
  .replace(/\n\n/g, '</p><p>')
  .replace(/\n/g, '<br>')
  .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
  .replace(/\*(.*?)\*/g, '<em>$1</em>');
bubble.style.lineHeight = '1.8';

    div.appendChild(avatar);
    div.appendChild(bubble);
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  // ── Typing indicator ──
  function showTyping() {
    const chatWindow = document.getElementById('chatWindow');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'typingIndicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = 'ॐ';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  // ── Wallet connect ──
  const SHARDEUM_TESTNET = {
    chainId: '0x1FB7',
    chainName: 'Shardeum Mezame (Testnet)',
    nativeCurrency: { name: 'SHM', symbol: 'SHM', decimals: 18 },
    rpcUrls: ['https://api-mezame.shardeum.org'],
    blockExplorerUrls: ['https://explorer-mezame.shardeum.org']
  };

  async function connectWallet() {
    if (!window.ethereum) {
      alert('Please install MetaMask to connect your wallet.');
      return;
    }
    try {
      await window.ethereum.request({ method: 'eth_requestAccounts' });
      const provider = new ethers.BrowserProvider(window.ethereum);
      const signer = await provider.getSigner();
      const account = await signer.getAddress();
      const short = account.slice(0, 6) + '…' + account.slice(-4);

      document.getElementById('connectBtn').textContent = 'Connected';
      document.getElementById('connectBtn').classList.add('connected');
      document.getElementById('walletBadge').textContent = short;
      document.getElementById('walletBadge').classList.add('visible');
    } catch (e) {
      alert('Wallet connection failed: ' + e.message);
    }
  }
</script>
</body>
</html>
